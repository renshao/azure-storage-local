<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azure Storage Local — Queue Browser</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1e1e1e; color: #d4d4d4; }
        .header { background: #0078d4; color: white; padding: 16px 24px; display: flex; align-items: center; gap: 12px; }
        .header h1 { font-size: 18px; font-weight: 600; }
        .header .badge { background: rgba(255,255,255,0.2); padding: 2px 8px; border-radius: 10px; font-size: 12px; }
        .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
        .panel { background: #252526; border: 1px solid #3c3c3c; border-radius: 6px; margin-bottom: 16px; }
        .panel-header { padding: 12px 16px; border-bottom: 1px solid #3c3c3c; display: flex; justify-content: space-between; align-items: center; }
        .panel-header h2 { font-size: 14px; font-weight: 600; color: #cccccc; }
        .queue-list { list-style: none; }
        .queue-item { padding: 10px 16px; border-bottom: 1px solid #2d2d2d; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: background 0.15s; }
        .queue-item:hover { background: #2a2d2e; }
        .queue-item.active { background: #094771; border-left: 3px solid #0078d4; }
        .queue-name { font-family: 'Cascadia Code', 'Consolas', monospace; font-size: 13px; }
        .queue-count { background: #3c3c3c; padding: 2px 8px; border-radius: 10px; font-size: 11px; color: #9cdcfe; }
        .messages-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .messages-table th { text-align: left; padding: 8px 12px; background: #2d2d2d; color: #9cdcfe; font-weight: 600; border-bottom: 1px solid #3c3c3c; }
        .messages-table td { padding: 8px 12px; border-bottom: 1px solid #2d2d2d; font-family: 'Cascadia Code', 'Consolas', monospace; font-size: 12px; max-width: 400px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .messages-table tr:hover { background: #2a2d2e; }
        .empty { padding: 32px; text-align: center; color: #666; font-style: italic; }
        .status-bar { padding: 8px 16px; font-size: 11px; color: #666; display: flex; justify-content: space-between; }
        .btn { background: #0e639c; color: white; border: none; padding: 6px 12px; border-radius: 3px; cursor: pointer; font-size: 12px; }
        .btn:hover { background: #1177bb; }
        .btn-danger { background: #c72e2e; }
        .btn-danger:hover { background: #e04040; }
        .visible { color: #4ec9b0; }
        .invisible { color: #ce9178; }
        .expired-soon { color: #f44747; }
        .msg-text { cursor: pointer; }
        .msg-text:hover { color: #9cdcfe; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); z-index: 100; }
        .modal { background: #252526; border: 1px solid #3c3c3c; border-radius: 8px; max-width: 600px; margin: 80px auto; padding: 24px; }
        .modal h3 { margin-bottom: 12px; color: #cccccc; }
        .modal pre { background: #1e1e1e; padding: 12px; border-radius: 4px; overflow-x: auto; font-size: 13px; white-space: pre-wrap; word-break: break-all; max-height: 400px; overflow-y: auto; }
        .modal .close-btn { float: right; background: none; border: none; color: #ccc; font-size: 18px; cursor: pointer; }
        .refresh-indicator { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #4ec9b0; margin-right: 6px; }
        .layout { display: grid; grid-template-columns: 300px 1fr; gap: 16px; }
        @media (max-width: 800px) { .layout { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="header">
        <h1>☁ Azure Storage Local</h1>
        <span class="badge">Queue Browser</span>
    </div>
    <div class="container">
        <div class="layout">
            <div>
                <div class="panel">
                    <div class="panel-header">
                        <h2>Queues</h2>
                        <button class="btn" onclick="refresh()">↻ Refresh</button>
                    </div>
                    <ul class="queue-list" id="queue-list">
                        <li class="empty">No queues found</li>
                    </ul>
                </div>
            </div>
            <div>
                <div class="panel">
                    <div class="panel-header">
                        <h2 id="messages-title">Select a queue</h2>
                        <div>
                            <button class="btn btn-danger" onclick="clearQueue()" id="clear-btn" style="display:none">Clear All</button>
                        </div>
                    </div>
                    <div id="messages-container">
                        <div class="empty">Select a queue from the left to view messages</div>
                    </div>
                    <div class="status-bar">
                        <span><span class="refresh-indicator"></span>Auto-refresh every 3s</span>
                        <span id="last-refresh">—</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modal-overlay" onclick="closeModal()">
        <div class="modal" onclick="event.stopPropagation()">
            <button class="close-btn" onclick="closeModal()">✕</button>
            <h3 id="modal-title">Message Details</h3>
            <pre id="modal-content"></pre>
        </div>
    </div>

    <script>
        let selectedQueue = null;
        let autoRefreshTimer = null;

        async function fetchQueues() {
            const res = await fetch('/api/queues');
            return await res.json();
        }

        async function fetchMessages(queueName) {
            const res = await fetch('/api/queues/' + encodeURIComponent(queueName) + '/messages');
            return await res.json();
        }

        async function clearQueue() {
            if (!selectedQueue) return;
            if (!confirm('Clear all messages from "' + selectedQueue + '"?')) return;
            await fetch('/api/queues/' + encodeURIComponent(selectedQueue) + '/messages', { method: 'DELETE' });
            refresh();
        }

        function tryDecodeBase64(text) {
            try {
                return atob(text);
            } catch {
                return text;
            }
        }

        async function refresh() {
            const queues = await fetchQueues();
            const list = document.getElementById('queue-list');

            if (queues.length === 0) {
                list.innerHTML = '<li class="empty">No queues found</li>';
            } else {
                list.innerHTML = queues.map(q =>
                    '<li class="queue-item' + (q.name === selectedQueue ? ' active' : '') +
                    '" onclick="selectQueue(\'' + q.name + '\')">' +
                    '<span class="queue-name">' + q.name + '</span>' +
                    '<span class="queue-count">' + q.messageCount + '</span>' +
                    '</li>'
                ).join('');
            }

            if (selectedQueue) {
                await loadMessages(selectedQueue);
            }
            document.getElementById('last-refresh').textContent = 'Last: ' + new Date().toLocaleTimeString();
        }

        async function selectQueue(name) {
            selectedQueue = name;
            document.getElementById('clear-btn').style.display = 'inline-block';
            await refresh();
        }

        async function loadMessages(queueName) {
            document.getElementById('messages-title').textContent = 'Messages in "' + queueName + '"';
            const messages = await fetchMessages(queueName);
            const container = document.getElementById('messages-container');

            if (!messages || messages.length === 0) {
                container.innerHTML = '<div class="empty">Queue is empty</div>';
                return;
            }

            const now = new Date();
            let html = '<table class="messages-table"><thead><tr>' +
                '<th>ID</th><th>Inserted</th><th>Expires</th><th>Visible</th><th>Dequeues</th><th>Message</th>' +
                '</tr></thead><tbody>';

            messages.forEach(msg => {
                const nextVisible = new Date(msg.timeNextVisible);
                const isVisible = nextVisible <= now;
                const visClass = isVisible ? 'visible' : 'invisible';
                const decoded = tryDecodeBase64(msg.messageText);
                const preview = decoded.length > 80 ? decoded.substring(0, 80) + '…' : decoded;

                html += '<tr>' +
                    '<td title="' + msg.messageId + '">' + msg.messageId.substring(0, 8) + '…</td>' +
                    '<td>' + new Date(msg.insertionTime).toLocaleTimeString() + '</td>' +
                    '<td>' + new Date(msg.expirationTime).toLocaleString() + '</td>' +
                    '<td class="' + visClass + '">' + (isVisible ? 'Yes' : new Date(msg.timeNextVisible).toLocaleTimeString()) + '</td>' +
                    '<td>' + msg.dequeueCount + '</td>' +
                    '<td class="msg-text" onclick="showMessage(\'' + msg.messageId + '\')" title="Click to expand">' + escapeHtml(preview) + '</td>' +
                    '</tr>';
            });
            html += '</tbody></table>';
            container.innerHTML = html;
        }

        function showMessage(id) {
            if (!selectedQueue) return;
            fetchMessages(selectedQueue).then(messages => {
                const msg = messages.find(m => m.messageId === id);
                if (!msg) return;
                const decoded = tryDecodeBase64(msg.messageText);
                document.getElementById('modal-title').textContent = 'Message ' + msg.messageId;

                let details = 'Message ID:      ' + msg.messageId + '\n' +
                    'Insertion Time:  ' + msg.insertionTime + '\n' +
                    'Expiration Time: ' + msg.expirationTime + '\n' +
                    'Next Visible:    ' + msg.timeNextVisible + '\n' +
                    'Dequeue Count:   ' + msg.dequeueCount + '\n' +
                    'Pop Receipt:     ' + msg.popReceipt + '\n\n' +
                    '--- Raw ---\n' + msg.messageText + '\n\n' +
                    '--- Decoded ---\n' + decoded;

                document.getElementById('modal-content').textContent = details;
                document.getElementById('modal-overlay').style.display = 'block';
            });
        }

        function closeModal() {
            document.getElementById('modal-overlay').style.display = 'none';
        }

        function escapeHtml(text) {
            const d = document.createElement('div');
            d.textContent = text;
            return d.innerHTML;
        }

        // Auto-refresh
        refresh();
        autoRefreshTimer = setInterval(refresh, 3000);

        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') closeModal();
        });
    </script>
</body>
</html>
