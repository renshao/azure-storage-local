<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azure Storage Local — Browser</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1e1e1e; color: #d4d4d4; }
        .header { background: #0078d4; color: white; padding: 16px 24px; display: flex; align-items: center; gap: 12px; }
        .header h1 { font-size: 18px; font-weight: 600; }
        .header .badge { background: rgba(255,255,255,0.2); padding: 2px 8px; border-radius: 10px; font-size: 12px; }
        .tabs { display: flex; background: #252526; border-bottom: 1px solid #3c3c3c; }
        .tab { padding: 10px 24px; cursor: pointer; font-size: 13px; color: #999; border-bottom: 2px solid transparent; transition: all 0.15s; }
        .tab:hover { color: #d4d4d4; }
        .tab.active { color: #fff; border-bottom-color: #0078d4; background: #1e1e1e; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
        .panel { background: #252526; border: 1px solid #3c3c3c; border-radius: 6px; margin-bottom: 16px; }
        .panel-header { padding: 12px 16px; border-bottom: 1px solid #3c3c3c; display: flex; justify-content: space-between; align-items: center; }
        .panel-header h2 { font-size: 14px; font-weight: 600; color: #cccccc; }
        .item-list { list-style: none; }
        .item-entry { padding: 10px 16px; border-bottom: 1px solid #2d2d2d; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: background 0.15s; }
        .item-entry:hover { background: #2a2d2e; }
        .item-entry.active { background: #094771; border-left: 3px solid #0078d4; }
        .item-name { font-family: 'Cascadia Code', 'Consolas', monospace; font-size: 13px; }
        .item-count { background: #3c3c3c; padding: 2px 8px; border-radius: 10px; font-size: 11px; color: #9cdcfe; }
        .data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .data-table th { text-align: left; padding: 8px 12px; background: #2d2d2d; color: #9cdcfe; font-weight: 600; border-bottom: 1px solid #3c3c3c; }
        .data-table td { padding: 8px 12px; border-bottom: 1px solid #2d2d2d; font-family: 'Cascadia Code', 'Consolas', monospace; font-size: 12px; max-width: 400px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .data-table tr:hover { background: #2a2d2e; }
        .empty { padding: 32px; text-align: center; color: #666; font-style: italic; }
        .status-bar { padding: 8px 16px; font-size: 11px; color: #666; display: flex; justify-content: space-between; }
        .btn { background: #0e639c; color: white; border: none; padding: 6px 12px; border-radius: 3px; cursor: pointer; font-size: 12px; }
        .btn:hover { background: #1177bb; }
        .btn-danger { background: #c72e2e; }
        .btn-danger:hover { background: #e04040; }
        .visible { color: #4ec9b0; }
        .invisible { color: #ce9178; }
        .clickable { cursor: pointer; }
        .clickable:hover { color: #9cdcfe; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); z-index: 100; }
        .modal { background: #252526; border: 1px solid #3c3c3c; border-radius: 8px; max-width: 600px; margin: 80px auto; padding: 24px; }
        .modal h3 { margin-bottom: 12px; color: #cccccc; }
        .modal pre { background: #1e1e1e; padding: 12px; border-radius: 4px; overflow-x: auto; font-size: 13px; white-space: pre-wrap; word-break: break-all; max-height: 400px; overflow-y: auto; }
        .modal .close-btn { float: right; background: none; border: none; color: #ccc; font-size: 18px; cursor: pointer; }
        .refresh-indicator { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #4ec9b0; margin-right: 6px; }
        .layout { display: grid; grid-template-columns: 300px 1fr; gap: 16px; }
        @media (max-width: 800px) { .layout { grid-template-columns: 1fr; } }
        .size { color: #b5cea8; }
    </style>
</head>
<body>
    <div class="header">
        <h1>☁ Azure Storage Local</h1>
        <span class="badge">Storage Browser</span>
    </div>
    <div class="tabs">
        <div class="tab active" onclick="switchTab('queues')">📨 Queues</div>
        <div class="tab" onclick="switchTab('blobs')">📦 Blobs</div>
    </div>

    <!-- QUEUES TAB -->
    <div class="tab-content active" id="tab-queues">
        <div class="container">
            <div class="layout">
                <div>
                    <div class="panel">
                        <div class="panel-header">
                            <h2>Queues</h2>
                            <button class="btn" onclick="refreshQueues()">↻ Refresh</button>
                        </div>
                        <ul class="item-list" id="queue-list">
                            <li class="empty">No queues found</li>
                        </ul>
                    </div>
                </div>
                <div>
                    <div class="panel">
                        <div class="panel-header">
                            <h2 id="messages-title">Select a queue</h2>
                            <button class="btn btn-danger" onclick="clearQueue()" id="clear-btn" style="display:none">Clear All</button>
                        </div>
                        <div id="messages-container">
                            <div class="empty">Select a queue to view messages</div>
                        </div>
                        <div class="status-bar">
                            <span><span class="refresh-indicator"></span>Auto-refresh every 3s</span>
                            <span id="last-refresh-q">—</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- BLOBS TAB -->
    <div class="tab-content" id="tab-blobs">
        <div class="container">
            <div class="layout">
                <div>
                    <div class="panel">
                        <div class="panel-header">
                            <h2>Containers</h2>
                            <button class="btn" onclick="refreshBlobs()">↻ Refresh</button>
                        </div>
                        <ul class="item-list" id="container-list">
                            <li class="empty">No containers found</li>
                        </ul>
                    </div>
                </div>
                <div>
                    <div class="panel">
                        <div class="panel-header">
                            <h2 id="blobs-title">Select a container</h2>
                        </div>
                        <div id="blobs-container">
                            <div class="empty">Select a container to view blobs</div>
                        </div>
                        <div class="status-bar">
                            <span><span class="refresh-indicator"></span>Auto-refresh every 3s</span>
                            <span id="last-refresh-b">—</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modal-overlay" onclick="closeModal()">
        <div class="modal" onclick="event.stopPropagation()">
            <button class="close-btn" onclick="closeModal()">✕</button>
            <h3 id="modal-title">Details</h3>
            <pre id="modal-content"></pre>
        </div>
    </div>

    <script>
        let selectedQueue = null;
        let selectedContainer = null;
        let currentTab = 'queues';

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelector(`.tab[onclick="switchTab('${tab}')"]`).classList.add('active');
            document.getElementById('tab-' + tab).classList.add('active');
            if (tab === 'queues') refreshQueues();
            else refreshBlobs();
        }

        // ========== QUEUES ==========
        async function refreshQueues() {
            const queues = await (await fetch('/api/queues')).json();
            const list = document.getElementById('queue-list');
            if (queues.length === 0) {
                list.innerHTML = '<li class="empty">No queues found</li>';
            } else {
                list.innerHTML = queues.map(q =>
                    `<li class="item-entry${q.name === selectedQueue ? ' active' : ''}" onclick="selectQueue('${q.name}')">
                        <span class="item-name">${q.name}</span>
                        <span class="item-count">${q.messageCount}</span>
                    </li>`
                ).join('');
            }
            if (selectedQueue) await loadMessages(selectedQueue);
            document.getElementById('last-refresh-q').textContent = 'Last: ' + new Date().toLocaleTimeString();
        }

        async function selectQueue(name) {
            selectedQueue = name;
            document.getElementById('clear-btn').style.display = 'inline-block';
            await refreshQueues();
        }

        async function clearQueue() {
            if (!selectedQueue || !confirm('Clear all messages from "' + selectedQueue + '"?')) return;
            await fetch('/api/queues/' + encodeURIComponent(selectedQueue) + '/messages', { method: 'DELETE' });
            refreshQueues();
        }

        async function loadMessages(queueName) {
            document.getElementById('messages-title').textContent = 'Messages in "' + queueName + '"';
            const messages = await (await fetch('/api/queues/' + encodeURIComponent(queueName) + '/messages')).json();
            const container = document.getElementById('messages-container');
            if (!messages || messages.length === 0) {
                container.innerHTML = '<div class="empty">Queue is empty</div>';
                return;
            }
            const now = new Date();
            let html = '<table class="data-table"><thead><tr><th>ID</th><th>Inserted</th><th>Expires</th><th>Visible</th><th>Dequeues</th><th>Message</th></tr></thead><tbody>';
            messages.forEach(msg => {
                const nextVisible = new Date(msg.timeNextVisible);
                const isVisible = nextVisible <= now;
                const decoded = tryDecode(msg.messageText);
                const preview = decoded.length > 80 ? decoded.substring(0, 80) + '…' : decoded;
                html += `<tr>
                    <td title="${msg.messageId}">${msg.messageId.substring(0, 8)}…</td>
                    <td>${new Date(msg.insertionTime).toLocaleTimeString()}</td>
                    <td>${new Date(msg.expirationTime).toLocaleString()}</td>
                    <td class="${isVisible ? 'visible' : 'invisible'}">${isVisible ? 'Yes' : new Date(msg.timeNextVisible).toLocaleTimeString()}</td>
                    <td>${msg.dequeueCount}</td>
                    <td class="clickable" onclick="showMessage('${msg.messageId}')" title="Click to expand">${escapeHtml(preview)}</td>
                </tr>`;
            });
            html += '</tbody></table>';
            container.innerHTML = html;
        }

        async function showMessage(id) {
            if (!selectedQueue) return;
            const messages = await (await fetch('/api/queues/' + encodeURIComponent(selectedQueue) + '/messages')).json();
            const msg = messages.find(m => m.messageId === id);
            if (!msg) return;
            const decoded = tryDecode(msg.messageText);
            document.getElementById('modal-title').textContent = 'Message ' + msg.messageId;
            document.getElementById('modal-content').textContent =
                `Message ID:      ${msg.messageId}\nInsertion Time:  ${msg.insertionTime}\nExpiration Time: ${msg.expirationTime}\nNext Visible:    ${msg.timeNextVisible}\nDequeue Count:   ${msg.dequeueCount}\nPop Receipt:     ${msg.popReceipt}\n\n--- Raw ---\n${msg.messageText}\n\n--- Decoded ---\n${decoded}`;
            document.getElementById('modal-overlay').style.display = 'block';
        }

        // ========== BLOBS ==========
        async function refreshBlobs() {
            const containers = await (await fetch('/api/containers')).json();
            const list = document.getElementById('container-list');
            if (containers.length === 0) {
                list.innerHTML = '<li class="empty">No containers found</li>';
            } else {
                list.innerHTML = containers.map(c =>
                    `<li class="item-entry${c.name === selectedContainer ? ' active' : ''}" onclick="selectContainer('${c.name}')">
                        <span class="item-name">${c.name}</span>
                        <span class="item-count">${c.blobCount}</span>
                    </li>`
                ).join('');
            }
            if (selectedContainer) await loadBlobs(selectedContainer);
            document.getElementById('last-refresh-b').textContent = 'Last: ' + new Date().toLocaleTimeString();
        }

        async function selectContainer(name) {
            selectedContainer = name;
            await refreshBlobs();
        }

        async function loadBlobs(containerName) {
            document.getElementById('blobs-title').textContent = 'Blobs in "' + containerName + '"';
            const blobs = await (await fetch('/api/containers/' + encodeURIComponent(containerName) + '/blobs')).json();
            const container = document.getElementById('blobs-container');
            if (!blobs || blobs.length === 0) {
                container.innerHTML = '<div class="empty">Container is empty</div>';
                return;
            }
            let html = '<table class="data-table"><thead><tr><th>Name</th><th>Type</th><th>Content-Type</th><th>Size</th><th>Last Modified</th></tr></thead><tbody>';
            blobs.forEach(b => {
                html += `<tr>
                    <td class="clickable" onclick="showBlob('${escapeHtml(b.name)}')" title="Click for details">${escapeHtml(b.name)}</td>
                    <td>${b.blobType}</td>
                    <td>${b.contentType}</td>
                    <td class="size">${formatSize(b.size)}</td>
                    <td>${new Date(b.lastModified).toLocaleString()}</td>
                </tr>`;
            });
            html += '</tbody></table>';
            container.innerHTML = html;
        }

        async function showBlob(name) {
            if (!selectedContainer) return;
            const blobs = await (await fetch('/api/containers/' + encodeURIComponent(selectedContainer) + '/blobs')).json();
            const b = blobs.find(x => x.name === name);
            if (!b) return;
            let metaStr = '';
            if (b.metadata && Object.keys(b.metadata).length > 0) {
                metaStr = '\n\nMetadata:\n' + Object.entries(b.metadata).map(([k,v]) => `  ${k}: ${v}`).join('\n');
            }
            document.getElementById('modal-title').textContent = b.name;
            document.getElementById('modal-content').textContent =
                `Name:          ${b.name}\nBlob Type:     ${b.blobType}\nContent-Type:  ${b.contentType}\nSize:          ${formatSize(b.size)}\nLast Modified: ${b.lastModified}${metaStr}`;
            document.getElementById('modal-overlay').style.display = 'block';
        }

        // ========== HELPERS ==========
        function tryDecode(text) { try { return atob(text); } catch { return text; } }
        function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
        function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }
        function formatSize(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024, sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
        }

        // Auto-refresh
        refreshQueues();
        setInterval(() => { if (currentTab === 'queues') refreshQueues(); else refreshBlobs(); }, 3000);
        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
    </script>
</body>
</html>
